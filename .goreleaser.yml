# GoReleaser config for deadsniper
# https://goreleaser.com
# Release: git tag v0.1.0 && git push origin v0.1.0 (CI runs goreleaser)

version: 2

project_name: deadsniper

builds:
  - id: default
    main: .
    binary: deadsniper
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
archives:
  - id: default
    formats:
      - binary
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - binary

release:
  github:
    owner: shutterscripter
    name: deadsniper
  name_template: "v{{.Version}}"
